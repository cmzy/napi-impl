# V8 build args — single source of truth.
# Merge order (low -> high): common -> platforms.<key> -> v8_args.local.yml -> NAPI_GN_EXTRA_ARGS_FILE -> CLI --gn-arg.
# `v8_jitless: true` triggers automatic expansion of the jitless bundle in scripts/build.py.

common:
  is_debug: false
  is_component_build: false
  v8_monolithic: true
  # Required when linking the monolith into a shared library on Linux: changes
  # V8's thread-local storage model so TLS relocations work under -shared.
  v8_monolithic_for_shared_library: true
  v8_use_external_startup_data: false
  # Sandbox restricts external ArrayBuffer / external String backing stores to
  # in-sandbox memory; our tests pass user-malloc'd memory across the C ABI so
  # disable both sandbox and pointer compression.
  v8_enable_sandbox: false
  v8_enable_pointer_compression: false
  # Note: use_custom_libcxx=false breaks on macOS 26 SDK due to libc++ module
  # version skew (V8's bundled headers vs. system Xcode). Safe to use V8's
  # bundled libc++ here because we expose only a C ABI — no C++ objects
  # cross the napi_* boundary, libc++ symbols stay hidden by -fvisibility.
  use_custom_libcxx: true
  # macOS 15.5 SDK is missing DarwinFoundation*.modulemap files V8's bundled
  # libc++ references; disable clang modules to fall back to plain includes.
  use_libcxx_modules: false
  treat_warnings_as_errors: false
  # A1: release 默认不分发 DWARF。桌面 .so 中 ~140M(80%) 是 .debug_* 段，去掉后
  # 从 ~175M 降到 ~27M（与已 strip 的 Android 同级），零功能/性能损失。
  # debug 配置由 scripts/build.py 覆盖回 symbol_level=2。
  symbol_level: 0
  v8_enable_i18n_support: false   # trim binary size; opt in if needed
  use_siso: false                 # M1 uses plain ninja, not Siso
  # B2: 在 9b918ab（去掉 is_official_build）基础上单独开 ThinLTO 多省 ~10-15% .text。
  # use_thin_lto 仍会触发 V8 BUILD.gn 注入 -fwhole-program-vtables —— 正是 v0.3.0 mac/ios
  # 链接挂的根因；patches/v8/0001 加了 napi_v8_disable_whole_program_vtables 开关绕开。
  # 本地实测 mac x64 libNapiV8.dylib=39M（含 ThinLTO + patch + symbol_level=0）。
  use_thin_lto: true
  napi_v8_disable_whole_program_vtables: true
  # external code space 默认级联自移动端 pointer_compression；sandbox=false 下无收益，
  # 显式关掉，避免引入不熟的 code 分配路径。
  v8_enable_external_code_space: false
  # 不用 is_official_build（官方 V8 embedding 路径）：官方编 v8_monolith 走标准 release、
  # 不开 official build（见 v8.dev/docs/embed）。is_official_build 是 chromium *app* 的发布
  # 配置，编「被宿主 dlopen 的独立 .so」时其 app 级特性会炸（v0.3.0 release 实测）：
  #   - mac/ios：native 构建里 host 工具 torque 被 target 的 whole-program-vtables 污染，
  #     ld64.lld 报 vtable undefined；
  #   - android：allocator-shim(--wrap=malloc) 接管全进程 malloc，test 二进制缺 __wrap_*。
  # 减包靠 A1(symbol_level=0) 即可，已省 ~84%(175M→~27M)；official build 增量仅 ~2-4M、
  # 不值这条官方没走过的路。同版本 V8 14.2.234 + 标准 release 在 v0.2.2 已全平台成功。
  # V8 14.x requires enable_rust=true (temporal_capi); accept the toolchain cost.

platforms:

  mac_arm64:
    target_os: mac
    target_cpu: arm64
    mac_deployment_target: "11.0"

  mac_x86_64:
    target_os: mac
    target_cpu: x64
    mac_deployment_target: "11.0"

  # iOS 同移动端开启指针压缩（说明见 android 段）。jitless 与 pointer compression 正交，
  # 二者可共存；build.py 的 JITLESS_BUNDLE 已不再强制关 pointer compression。
  ios_arm64:
    target_os: ios
    target_cpu: arm64
    target_environment: device
    ios_deployment_target: "13.0"
    ios_enable_code_signing: false
    v8_jitless: true
    v8_enable_pointer_compression: true

  ios_sim_arm64:
    target_os: ios
    target_cpu: arm64
    target_environment: simulator
    ios_deployment_target: "13.0"
    v8_jitless: true
    v8_enable_pointer_compression: true

  ios_sim_x86_64:
    target_os: ios
    target_cpu: x64
    target_environment: simulator
    ios_deployment_target: "13.0"
    v8_jitless: true
    v8_enable_pointer_compression: true

  # 移动端开启指针压缩：堆内对象指针 8B->4B，V8 堆内存通常省 ~30-40%（内存敏感平台）。
  # sandbox 仍关（见 common）：external ArrayBuffer/String 仍可指向跨 C ABI 的 user-malloc
  # 内存——pointer compression 本身不限制 external backing store，那是 sandbox 的约束。
  # 代价：每 isolate 堆上限 ~4GB（移动端 JS 堆远低于此，无碍）。⚠️ 需跑一致性套件验证
  # external/SAB 路径。
  android_arm64:
    target_os: android
    target_cpu: arm64
    android64_ndk_api_level: 21
    v8_enable_pointer_compression: true

  android_x86_64:
    target_os: android
    target_cpu: x64
    android64_ndk_api_level: 21
    v8_enable_pointer_compression: true

  linux_x64:
    target_os: linux
    target_cpu: x64

  windows_x64:
    target_os: win
    target_cpu: x64
