name: JSC NAPI CI

# Locks the JSC backend on Apple platforms. JSC ships no Node-API, so we
# hand-write the napi_* surface on JavaScriptCore's system framework (src/jsc);
# there is no engine to pre-build. Each job builds libnapi_jsc, checks
# symbol-export discipline, and runs the upstream nodejs/node test/js-native-api
# suite through our host runner, gating on a 50/50 baseline:
#
#   macOS arm64          -> CTest unit tests + js-native-api suite
#   iOS simulator arm64  -> js-native-api suite via `simctl spawn`
#
# The simulator allows JIT (it runs on the host), so the iOS job validates
# functional correctness on the iOS JSC/SDK, not the real-device jitless path
# (JSC results are identical jitless — only slower). Both run on macos-15
# (Apple Silicon / arm64). Linux/Android/Windows would need a built WebKit JSC
# (J2) and are not covered here.

on:
  push:
    branches: [main, 'worktree-jsc-napi']
  pull_request:
  workflow_dispatch:

# Baseline: full pass on both platforms (see PLAN.md "M8 — JSC"). The suite is
# fully green, so the gate is exact; lower it only with a documented regression.
env:
  JSC_MIN_PASS: '50'

jobs:
  macos:
    name: macOS arm64 — unit tests + js-native-api suite
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install build deps
        run: brew install ninja

      - name: Build libnapi_jsc (mac arm64)
        run: python3 scripts/build.py --engine=jsc --platform=mac --arch=arm64

      - name: Unit tests (smoke / weakref / v8compat / buffers)
        run: ctest --test-dir out/build/jsc-mac-arm64-release --output-on-failure

      - name: Export discipline (only napi_*/node_api_*, no leaks)
        run: |
          DYLIB=out/build/jsc-mac-arm64-release/src/jsc/libnapi_jsc.dylib
          TOTAL=$(nm -gU "$DYLIB" | wc -l | tr -d ' ')
          NAPI=$(nm -gU "$DYLIB" | awk '{print $3}' | grep -cE '^_(napi|node_api)_')
          echo "napi exports: $NAPI / total $TOTAL"
          test "$NAPI" -eq "$TOTAL"   # zero non-napi exports leaked
          test "$TOTAL" -ge 150       # full surface + V8-compat extensions

      - name: Sync upstream js-native-api tests
        run: python3 scripts/sync_napi_tests.py

      - name: Build test bindings (mac arm64)
        run: python3 scripts/build_tests.py --engine=jsc --platform=mac --arch=arm64

      - name: Run js-native-api suite (baseline gate)
        run: |
          python3 scripts/run_tests.py --engine=jsc --platform=mac --arch=arm64 \
            --keep-going --min-pass "${JSC_MIN_PASS}"

  ios-sim:
    name: iOS simulator arm64 — js-native-api suite
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install build deps
        run: brew install ninja

      - name: Build libnapi_jsc + runner (iOS simulator arm64)
        run: python3 scripts/build.py --engine=jsc --platform=ios_sim --arch=arm64

      - name: Boot an iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available \
                 | grep -i iPhone \
                 | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' \
                 | head -1)
          test -n "$UDID"
          echo "booting $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID"

      - name: Sync upstream js-native-api tests
        run: python3 scripts/sync_napi_tests.py

      - name: Build test bindings (iOS simulator arm64)
        run: python3 scripts/build_tests.py --engine=jsc --platform=ios_sim --arch=arm64

      - name: Run js-native-api suite on simulator (baseline gate)
        run: |
          # The iOS simulator runs JIT through the host but is markedly slower than
          # a native run — test_reference (heavy Reference/finalizer/GC churn) needs
          # well over the 30s default. Give a generous per-test timeout so a slow
          # simulator doesn't flake the baseline gate (macOS runs natively, keeps 30s).
          python3 scripts/run_tests.py --engine=jsc --platform=ios_sim --arch=arm64 \
            --timeout 180 --keep-going --min-pass "${JSC_MIN_PASS}"

  package:
    name: Static lib + .xcframework (macOS + iOS device + iOS simulator)
    runs-on: macos-15
    timeout-minutes: 60
    # JSC is distributed as a STATIC archive (libnapi_jsc.a) — iOS free-team apps
    # have no dynamic-code entitlement and consumers prefer static linking. This
    # job builds the per-arch static CMake packages and assembles the multi-slice
    # NapiJSC.xcframework (mac arm64+x86_64, iOS device arm64, iOS simulator
    # arm64+x86_64), then gates on the static archive's export discipline (only
    # napi_*/node_api_* re-export from a consumer link; internals stay hidden).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install build deps
        run: brew install ninja

      - name: Build static lib + cmake package (every Apple slice)
        run: |
          for slice in mac:arm64 mac:x86_64 ios:arm64 ios_sim:arm64 ios_sim:x86_64; do
            python3 scripts/build.py --engine=jsc \
              --platform="${slice%%:*}" --arch="${slice##*:}" --package
          done

      - name: Assemble NapiJSC.xcframework
        run: python3 scripts/package_apple.py --engine=jsc --target=xcframework --version=0.0.0-ci

      - name: Verify outputs exist
        run: |
          test -d out/dist/NapiJSC.xcframework
          for s in mac-arm64 mac-x86_64 ios-arm64 ios_sim-arm64 ios_sim-x86_64; do
            test -f "out/dist/napi-jsc-$s.tar.gz" || { echo "missing napi-jsc-$s"; exit 1; }
          done

      - name: Static-archive export discipline (only napi_*, internals hidden)
        run: |
          A=out/build/jsc-mac-arm64-release/src/jsc/libnapi_jsc.a
          # A consumer that links the archive must re-export exactly the napi_*
          # surface and nothing else; prove it by linking into a throwaway dylib.
          clang++ -dynamiclib -arch arm64 -fvisibility=hidden -x c++ /dev/null \
            -Wl,-force_load,"$A" -framework JavaScriptCore -o /tmp/probe.dylib
          TOTAL=$(nm -gU /tmp/probe.dylib | awk '{print $3}' | grep -c .)
          NAPI=$(nm -gU /tmp/probe.dylib | awk '{print $3}' | grep -cE '^_(napi|node_api)_')
          echo "static->dylib exports: napi_*=$NAPI / total=$TOTAL"
          test "$NAPI" -eq "$TOTAL"   # zero non-napi exports leaked
          test "$NAPI" -ge 150        # full surface + V8-compat extensions

      - uses: actions/upload-artifact@v4
        with:
          name: NapiJSC.xcframework
          path: out/dist/NapiJSC.xcframework

      # Per-arch static CMake packages — same artifacts the release flow ships, so
      # PR/push consumers can grab a single-slice package without cutting a release.
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-mac-arm64,      path: out/dist/napi-jsc-mac-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-mac-x86_64,     path: out/dist/napi-jsc-mac-x86_64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios-arm64,      path: out/dist/napi-jsc-ios-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios_sim-arm64,  path: out/dist/napi-jsc-ios_sim-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios_sim-x86_64, path: out/dist/napi-jsc-ios_sim-x86_64.tar.gz }
