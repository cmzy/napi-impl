name: Release Build

# Triggers:
#   - A pushed tag matching v*  (most common)
#   - A published GitHub Release
#   - Manual dispatch for testing
on:
  push:
    tags: ['v*']
  release:
    types: [created, published]
  workflow_dispatch:

# Per-platform jobs each produce:
#   - per-arch CMake packages (every platform)
#   - macOS .framework  (macos job)
#   - iOS .framework    (ios job — device arm64)
#   - Android AAR       (android job)
# The release job collects everything and posts to the tag.

jobs:
  macos:
    name: macOS framework + cmake
    runs-on: macos-15
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: System python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Cache V8 source
        uses: actions/cache@v4
        with:
          path: |
            third_party/depot_tools
            third_party/v8
            third_party/node_ref
          key: v8-apple-${{ hashFiles('V8_VERSION', 'config/v8_args.yml', 'DEPS', 'scripts/setup.py') }}

      - name: Setup
        run: python3 scripts/setup.py

      - name: Build mac arm64
        run: python3 scripts/build.py --platform=mac --arch=arm64 --gn-arg use_custom_libcxx=false --gn-arg use_clang_modules=false

      - name: Build mac x86_64
        run: python3 scripts/build.py --platform=mac --arch=x86_64 --gn-arg use_custom_libcxx=false --gn-arg use_clang_modules=false

      - name: Assemble macOS framework
        run: python3 scripts/package_apple.py --target=macos --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (mac arm64)
        run: python3 scripts/package_cmake.py --platform=mac --arch=arm64 --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (mac x86_64)
        run: python3 scripts/package_cmake.py --platform=mac --arch=x86_64 --version=${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: NapiV8-macos.framework
          path: out/dist/NapiV8-macos.framework

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-mac-arm64
          path: out/dist/napi-v8-mac-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-mac-x86_64
          path: out/dist/napi-v8-mac-x86_64.tar.gz

  ios:
    name: iOS framework + cmake
    runs-on: macos-15
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: System python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Cache V8 source
        uses: actions/cache@v4
        with:
          path: |
            third_party/depot_tools
            third_party/v8
            third_party/node_ref
          key: v8-apple-${{ hashFiles('V8_VERSION', 'config/v8_args.yml', 'DEPS', 'scripts/setup.py') }}

      - name: Setup
        run: python3 scripts/setup.py

      - name: Build iOS arm64 (device)
        run: python3 scripts/build.py --platform=ios --arch=arm64 --gn-arg use_custom_libcxx=false --gn-arg use_clang_modules=false

      - name: Build iOS simulator arm64
        run: python3 scripts/build.py --platform=ios_sim --arch=arm64 --gn-arg use_custom_libcxx=false --gn-arg use_clang_modules=false

      - name: Build iOS simulator x86_64
        run: python3 scripts/build.py --platform=ios_sim --arch=x86_64 --gn-arg use_custom_libcxx=false --gn-arg use_clang_modules=false

      - name: Assemble iOS framework (device)
        run: python3 scripts/package_apple.py --target=ios --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (ios arm64 device)
        run: python3 scripts/package_cmake.py --platform=ios --arch=arm64 --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (ios_sim arm64)
        run: python3 scripts/package_cmake.py --platform=ios_sim --arch=arm64 --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (ios_sim x86_64)
        run: python3 scripts/package_cmake.py --platform=ios_sim --arch=x86_64 --version=${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: NapiV8-ios.framework
          path: out/dist/NapiV8-ios.framework

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-ios-arm64
          path: out/dist/napi-v8-ios-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-ios_sim-arm64
          path: out/dist/napi-v8-ios_sim-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-ios_sim-x86_64
          path: out/dist/napi-v8-ios_sim-x86_64.tar.gz

  linux:
    name: Linux x64 cmake
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl python3 python3-pip pkg-config build-essential \
            libglib2.0-dev libgtk-3-dev libnss3 libx11-xcb1
          pip install pyyaml

      - name: Cache V8 source
        uses: actions/cache@v4
        with:
          path: |
            third_party/depot_tools
            third_party/v8
            third_party/node_ref
          key: v8-linux-${{ hashFiles('V8_VERSION', 'config/v8_args.yml', 'DEPS', 'scripts/setup.py') }}

      - name: Setup
        run: python3 scripts/setup.py

      - name: Build linux x64
        run: python3 scripts/build.py --platform=linux --arch=x64

      - name: Package CMake
        run: python3 scripts/package_cmake.py --platform=linux --arch=x64 --version=${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-linux-x64
          path: out/dist/napi-v8-linux-x64.tar.gz

  android:
    name: Android AAR + cmake
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl python3 python3-pip pkg-config build-essential
          pip install pyyaml

      - name: Setup Android NDK
        id: setup_ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          local-cache: true

      - name: Cache V8 source
        uses: actions/cache@v4
        with:
          path: |
            third_party/depot_tools
            third_party/v8
            third_party/node_ref
          key: v8-android-${{ hashFiles('V8_VERSION', 'config/v8_args.yml', 'DEPS', 'scripts/setup.py') }}

      - name: Add android target_os
        run: |
          mkdir -p third_party
          cat > third_party/.gclient <<EOF
          solutions = [
            {
              "name": "v8",
              "url": "https://chromium.googlesource.com/v8/v8.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["android", "linux"]
          EOF

      - name: Setup
        run: python3 scripts/setup.py

      - name: Build android arm64
        run: python3 scripts/build.py --platform=android --arch=arm64

      - name: Build android x86_64
        run: python3 scripts/build.py --platform=android --arch=x86_64

      - name: Package AAR
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: python3 scripts/package_android.py --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (android arm64)
        run: python3 scripts/package_cmake.py --platform=android --arch=arm64 --version=${GITHUB_REF_NAME#v}

      - name: Package CMake (android x86_64)
        run: python3 scripts/package_cmake.py --platform=android --arch=x86_64 --version=${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8.aar
          path: out/dist/napi-v8.aar

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-android-arm64
          path: out/dist/napi-v8-android-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-android-x86_64
          path: out/dist/napi-v8-android-x86_64.tar.gz

  windows:
    name: Windows x64 cmake
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Cache V8 source
        uses: actions/cache@v4
        with:
          path: |
            third_party/depot_tools
            third_party/v8
            third_party/node_ref
          key: v8-windows-${{ hashFiles('V8_VERSION', 'config/v8_args.yml', 'DEPS', 'scripts/setup.py') }}

      - name: Setup
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
        run: python scripts/setup.py
        shell: cmd

      - name: Build windows x64
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
        run: python scripts/build.py --platform=windows --arch=x64
        shell: cmd

      - name: Package CMake
        run: python scripts/package_cmake.py --platform=windows --arch=x64 --version=%GITHUB_REF_NAME:~1%
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: napi-v8-windows-x64
          path: out/dist/napi-v8-windows-x64.zip

  jsc-apple:
    name: JSC static .xcframework + cmake (macOS + iOS)
    runs-on: macos-15
    timeout-minutes: 90
    # JSC targets Apple's system JavaScriptCore.framework — no V8/Hermes engine to
    # build, so this job needs neither the V8 source cache nor scripts/setup.py.
    # Ships a STATIC archive (libnapi_jsc.a): per-arch CMake packages + a
    # multi-slice NapiJSC.xcframework (mac arm64+x86_64, iOS device arm64, iOS
    # simulator arm64+x86_64).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install build deps
        run: brew install ninja

      - name: Build JSC static slices + cmake packages
        run: |
          for slice in mac:arm64 mac:x86_64 ios:arm64 ios_sim:arm64 ios_sim:x86_64; do
            python3 scripts/build.py --engine=jsc \
              --platform="${slice%%:*}" --arch="${slice##*:}" --package
          done

      - name: Assemble NapiJSC.xcframework
        run: python3 scripts/package_apple.py --engine=jsc --target=xcframework --version=${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: NapiJSC.xcframework
          path: out/dist/NapiJSC.xcframework

      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-mac-arm64,     path: out/dist/napi-jsc-mac-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-mac-x86_64,    path: out/dist/napi-jsc-mac-x86_64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios-arm64,     path: out/dist/napi-jsc-ios-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios_sim-arm64, path: out/dist/napi-jsc-ios_sim-arm64.tar.gz }
      - uses: actions/upload-artifact@v4
        with: { name: napi-jsc-ios_sim-x86_64, path: out/dist/napi-jsc-ios_sim-x86_64.tar.gz }

  release:
    name: Attach to release
    needs: [macos, ios, linux, android, windows, jsc-apple]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Re-zip apple frameworks
        run: |
          cd dist
          (cd NapiV8-macos.framework && zip -r ../NapiV8-macos.framework.zip .)
          (cd NapiV8-ios.framework   && zip -r ../NapiV8-ios.framework.zip .)
          (cd NapiJSC.xcframework    && zip -r ../NapiJSC.xcframework.zip .)

      - name: Compose release body
        run: |
          {
            echo "## Artifacts"
            echo ""
            echo "| File | Platform |"
            echo "| ---- | -------- |"
            echo "| \`NapiV8-macos.framework.zip\` | macOS framework (arm64 + x86_64 lipo) |"
            echo "| \`NapiV8-ios.framework.zip\` | iOS framework (device arm64) |"
            echo "| \`NapiJSC.xcframework.zip\` | JSC static xcframework (macOS + iOS device + iOS simulator) |"
            echo "| \`napi-v8.aar\` | Android (arm64-v8a + x86_64, Prefab v2) |"
            echo "| \`napi-v8-mac-arm64.tar.gz\` | macOS arm64 CMake |"
            echo "| \`napi-v8-mac-x86_64.tar.gz\` | macOS x86_64 CMake |"
            echo "| \`napi-v8-ios-arm64.tar.gz\` | iOS device arm64 CMake |"
            echo "| \`napi-v8-ios_sim-arm64.tar.gz\` | iOS simulator arm64 CMake |"
            echo "| \`napi-v8-ios_sim-x86_64.tar.gz\` | iOS simulator x86_64 CMake |"
            echo "| \`napi-v8-android-arm64.tar.gz\` | Android arm64-v8a CMake |"
            echo "| \`napi-v8-android-x86_64.tar.gz\` | Android x86_64 CMake |"
            echo "| \`napi-v8-linux-x64.tar.gz\` | Linux x64 CMake |"
            echo "| \`napi-v8-windows-x64.zip\` | Windows x64 CMake |"
            echo "| \`napi-jsc-mac-arm64.tar.gz\` | JSC macOS arm64 CMake (static) |"
            echo "| \`napi-jsc-mac-x86_64.tar.gz\` | JSC macOS x86_64 CMake (static) |"
            echo "| \`napi-jsc-ios-arm64.tar.gz\` | JSC iOS device arm64 CMake (static) |"
            echo "| \`napi-jsc-ios_sim-arm64.tar.gz\` | JSC iOS simulator arm64 CMake (static) |"
            echo "| \`napi-jsc-ios_sim-x86_64.tar.gz\` | JSC iOS simulator x86_64 CMake (static) |"
            echo ""
            for f in dist/napi-v8-linux-x64/napi-v8-linux-x64/BUILD_INFO.md \
                     dist/NapiV8-macos.framework/BUILD_INFO.md; do
              if [ -f "$f" ]; then
                echo "---"
                echo ""
                cat "$f"
                echo ""
                break
              fi
            done
          } > RELEASE_BODY.md
          cat RELEASE_BODY.md

      - name: Publish artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: |
            dist/NapiV8-macos.framework.zip
            dist/NapiV8-ios.framework.zip
            dist/NapiJSC.xcframework.zip
            dist/napi-jsc-mac-arm64/napi-jsc-mac-arm64.tar.gz
            dist/napi-jsc-mac-x86_64/napi-jsc-mac-x86_64.tar.gz
            dist/napi-jsc-ios-arm64/napi-jsc-ios-arm64.tar.gz
            dist/napi-jsc-ios_sim-arm64/napi-jsc-ios_sim-arm64.tar.gz
            dist/napi-jsc-ios_sim-x86_64/napi-jsc-ios_sim-x86_64.tar.gz
            dist/napi-v8.aar/napi-v8.aar
            dist/napi-v8-mac-arm64/napi-v8-mac-arm64.tar.gz
            dist/napi-v8-mac-x86_64/napi-v8-mac-x86_64.tar.gz
            dist/napi-v8-ios-arm64/napi-v8-ios-arm64.tar.gz
            dist/napi-v8-ios_sim-arm64/napi-v8-ios_sim-arm64.tar.gz
            dist/napi-v8-ios_sim-x86_64/napi-v8-ios_sim-x86_64.tar.gz
            dist/napi-v8-android-arm64/napi-v8-android-arm64.tar.gz
            dist/napi-v8-android-x86_64/napi-v8-android-x86_64.tar.gz
            dist/napi-v8-linux-x64/napi-v8-linux-x64.tar.gz
            dist/napi-v8-windows-x64/napi-v8-windows-x64.zip
          fail_on_unmatched_files: false
